<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="./favicon.ico" type="image/x-icon">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Commercial portfolio of Himanshu Shekhar, Industrial Lubricants Key Account Manager.">
  <meta name="robots" content="noindex,nofollow">
  <title>Himanshu Shekhar | Industrial Lubricants KAM</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/content.js" defer></script>
  <script src="js/site.js?v=2" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="loading-screen" id="loadingScreen" aria-live="polite">
    <div class="loading-mark">HS</div>
    <span id="loadingText">Building the commercial picture…</span>
  </div>

  <header class="site-header" id="siteHeader">
    <a class="brand-mark magnetic" href="#top" data-cursor="Home" aria-label="Himanshu Shekhar home">
      <span id="brandInitials">HS</span>
    </a>
    <nav class="desktop-nav" id="desktopNav" aria-label="Primary navigation"></nav>
    <a class="header-cta magnetic" id="headerCta" href="#contact" data-cursor="Contact">Let's talk</a>
    <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="mobileNav" aria-label="Open navigation">
      <span></span><span></span>
    </button>
    <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation"></nav>
  </header>

  <main id="main">
    <section class="hero" id="top">
      <div class="hero-copy">
        <p class="eyebrow reveal" id="heroEyebrow"></p>
        <h1 class="hero-title reveal" id="heroHeadline"></h1>
        <p class="hero-subtitle reveal" id="heroSubheadline"></p>
        <div class="hero-actions reveal">
          <a class="button button-dark magnetic" id="primaryButton" href="#impact" data-cursor="See impact"></a>
          <button class="button button-light magnetic" id="resumeButton" type="button" data-cursor="View résumé"></button>
        </div>
      </div>
      <a class="scroll-cue magnetic" href="#impact" data-cursor="Scroll" aria-label="Scroll to commercial impact">
      <span id="scrollLabel">Scroll</span><i></i>
      </a>
    </section>

    <div id="sectionMount"></div>
  </main>

  <footer class="site-footer">
    <div>
      <strong id="footerCopyright"></strong>
      <span id="footerNote"></span>
    </div>
    <a class="owner-login magnetic" id="ownerLogin" href="admin.html" data-cursor="Owner studio">Owner login</a>
  </footer>

  <dialog class="document-modal" id="documentModal" aria-labelledby="documentTitle">
    <div class="modal-bar">
      <div>
        <span id="credentialViewerLabel">Credential viewer</span>
        <strong id="documentTitle">Document</strong>
      </div>
      <div class="modal-actions">
        <a class="document-download magnetic" id="documentDownload" href="#" download data-cursor="Download this" hidden>
          <span aria-hidden="true">↓</span><b id="downloadLabel">Download</b>
        </a>
        <button class="modal-close magnetic" id="modalClose" type="button" data-cursor="Close" aria-label="Close document viewer">×</button>
      </div>
    </div>
    <div class="document-stage" id="documentStage"></div>
  </dialog>

  <div class="custom-cursor" id="customCursor" aria-hidden="true"><span></span></div>
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="touch-ripple" id="touchRipple" aria-hidden="true"></div>
  <noscript>This portfolio requires JavaScript to display its content.</noscript>
</body>
</html>
